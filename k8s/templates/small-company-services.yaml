apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: pantheon-lab-placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
        pantheon.io/trusted: "true"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend-service
          image: pantheon-fake-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: frontend-service
            - name: SERVICE_TYPE
              value: frontend
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: pantheon-lab-placeholder
spec:
  selector:
    app: frontend-service
  ports:
    - port: 8080
      targetPort: 8080
